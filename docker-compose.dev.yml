# ==============================================================================
# TFG Medio Ambiente UA — Docker Compose (Desarrollo)
# ==============================================================================
# Uso: docker compose -f docker-compose.dev.yml up --build
# ==============================================================================

services:
  # ─── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: ecoalerta-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ecoalerta_dev}
      POSTGRES_USER: ${DB_USER:-ecoalerta}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seeds:/docker-entrypoint-initdb.d/seeds
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecoalerta} -d ${DB_NAME:-ecoalerta_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API (Node.js + Express) ───────────────────────────────────────
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: development
    container_name: ecoalerta-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ecoalerta_dev}
      DB_USER: ${DB_USER:-ecoalerta}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      - ./src/backend/src:/app/src:delegated
      - ./src/backend/tests:/app/tests:delegated
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  # ─── Frontend (React) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: development
    container_name: ecoalerta-web
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api/v1
      REACT_APP_MAP_DEFAULT_LAT: 38.3452
      REACT_APP_MAP_DEFAULT_LNG: -0.4815
      REACT_APP_MAP_DEFAULT_ZOOM: 13
      REACT_APP_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./src/frontend/src:/app/src:delegated
      - ./src/frontend/public:/app/public:delegated
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm start

volumes:
  pgdata:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
